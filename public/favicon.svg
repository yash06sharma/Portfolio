<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256">
      <stop offset="0%" stop-color="#14F1D9"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="64" fill="#0B1120"/>

  <!-- Glow circle -->
  <circle cx="128" cy="128" r="92" fill="url(#bg)" opacity="0.15"/>

  <!-- Code Icon -->
  <g filter="url(#glow)" stroke="url(#bg)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left -->
    <path d="M92 88L52 128L92 168"/>

    <!-- Slash -->
    <path d="M146 72L110 184"/>

    <!-- Right -->
    <path d="M164 88L204 128L164 168"/>
  </g>
</svg>
